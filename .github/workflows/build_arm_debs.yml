name: Build ARM64 DEBs

on:
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: Package to build
        options:
          - server
          - client
      baseimage:
        type: choice
        description: Base Docker image
        options:
          - debian:bookworm-slim
          - debian:trixie-slim
          - ubuntu:noble
          - ubuntu:jammy

jobs:
  build-arm64-cross:
    runs-on: ubuntu-24.04

    steps:
      # Checkout repo with submodules
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # Enable QEMU for cross-build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Enable Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build ARM64 DEBs from submodule
      - name: Build ARM64 packages
        run: |
          options="${{ github.event.inputs.package }}"
          docker buildx build \
            -o proxmox-backup-arm64/packages \
            --build-arg buildoptions="cross github ${options}" \
            --build-arg baseimage=${{ github.event.inputs.baseimage }} \
            --platform linux/amd64 \
            -f proxmox-backup-arm64/.github/Dockerfile.crosscompile-arm64 \
            proxmox-backup-arm64

          # Export version info
          echo "DEB_VERSION=$(dpkg --info proxmox-backup-arm64/packages/proxmox-backup-server_*.deb | sed -n '/Version/ s/[^:]\+: //p')" >> $GITHUB_ENV
          echo "DEB_VERSION_UPSTREAM=$(dpkg --info proxmox-backup-arm64/packages/proxmox-backup-server_*.deb | sed -n '/Version/ s/[^:]\+: \([0-9.]\+\)-[0-9]/\1/p')" >> $GITHUB_ENV

      # Upload built .deb files as artifacts
      - name: Upload .deb packages
        uses: actions/upload-artifact@v7
        with:
          name: proxmox-arm64-debs
          path: proxmox-backup-arm64/packages/*.deb
